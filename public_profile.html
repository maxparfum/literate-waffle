<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">Profile - MaxParfum</title>
  <meta name="description" id="page-description" content="View this user's fragrance taste profile on MaxParfum.">
  <meta name="robots" id="page-robots" content="index, follow">
  <link rel="canonical" id="page-canonical" href="https://www.maxparfum.net/public_profile.html">

  <meta property="og:title" id="og-title" content="Profile - MaxParfum">
  <meta property="og:description" id="og-description" content="View this user's fragrance taste profile on MaxParfum.">
  <meta property="og:type" content="profile">
  <meta property="og:url" id="og-url" content="https://www.maxparfum.net/public_profile.html">
  <meta property="og:site_name" content="MaxParfum">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" id="twitter-title" content="Profile - MaxParfum">
  <meta name="twitter:description" id="twitter-description" content="View this user's fragrance taste profile on MaxParfum.">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #000;
      color: #fff;
      min-height: 100vh;
      padding-top: 70px;
    }

    .profile-container {
      max-width: 900px;
      margin: 32px auto;
      padding: 0 20px 60px;
    }

    /* ── HEADER ─────────────────────────────────────── */
    .profile-header-section {
      position: relative;
      background: #111;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }

    .header-image {
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, #2C130B, #4a2619);
      background-size: cover;
      background-position: center;
    }

    .profile-info-wrapper {
      position: relative;
      padding: 72px 28px 24px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .profile-picture {
      position: absolute;
      top: -56px;
      left: 28px;
      width: 112px;
      height: 112px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2C130B, #4a2619);
      background-size: cover;
      background-position: center;
      border: 4px solid #111;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
      flex-shrink: 0;
    }

    .profile-main-info { flex: 1; min-width: 220px; }

    .profile-name {
      font-family: 'Cinzel', serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 2px;
      line-height: 1.2;
    }

    .profile-handle {
      font-size: 0.85rem;
      color: #C59849;
      margin-bottom: 6px;
      letter-spacing: 0.4px;
    }

    .profile-meta-line {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 8px;
    }

    .profile-sig-line {
      font-size: 0.85rem;
      color: #C2C2C2;
      margin-bottom: 8px;
    }

    .profile-sig-line span { color: #C59849; }

    .profile-style-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .style-chip {
      background: rgba(197, 152, 73, 0.15);
      border: 1px solid rgba(197, 152, 73, 0.35);
      color: #C59849;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .profile-bio-header {
      font-size: 0.85rem;
      color: #C2C2C2;
      line-height: 1.5;
      margin-top: 4px;
    }

    /* stats in header */
    .profile-header-stats {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .header-stat {
      background: rgba(44,19,11,.3);
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      transition: border-color .25s, background .25s;
      text-align: center;
      min-width: 76px;
    }

    .header-stat:hover { border-color: #C59849; background: rgba(44,19,11,.5); }

    .header-stat-num {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      color: #C59849;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 3px;
    }

    .header-stat-label {
      color: #999;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* follow btn */
    .btn-follow, .btn-following {
      font-family: 'Montserrat', sans-serif;
      padding: 9px 22px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all .25s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-follow {
      background: #2C130B;
      border: 1px solid #C59849;
      color: #fff;
    }

    .btn-follow:hover { background: #4a2619; }
    .btn-follow:disabled, .btn-following:disabled { opacity: .6; cursor: not-allowed; }

    .btn-following {
      background: transparent;
      border: 1px solid #555;
      color: #888;
    }

    .btn-following:hover { border-color: #8B0000; color: #ff6666; background: rgba(139,0,0,.15); }

    /* ── SECTION ─────────────────────────────────────── */
    .profile-section {
      background: linear-gradient(135deg, #111, #1e1e1e);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2C130B;
    }

    .section-title {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: #fff;
    }

    .section-content {
      color: #ddd;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .section-content.empty {
      color: #666;
      font-style: italic;
      font-size: 0.9rem;
    }

    /* ── SCENT DNA CHIPS ─────────────────────────────── */
    .dna-row {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 10px;
    }

    .dna-row:last-child { margin-bottom: 0; }

    .dna-label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      min-width: 110px;
    }

    .dna-chips { display: flex; flex-wrap: wrap; gap: 5px; }

    .dna-chip {
      background: rgba(44,19,11,.4);
      border: 1px solid #3a3a3a;
      color: #C2C2C2;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.76rem;
    }

    .dna-chip.negative {
      background: rgba(80,20,20,.3);
      border-color: #4a2020;
      color: #d08080;
    }

    .dna-chip.strength {
      background: rgba(197,152,73,.18);
      border-color: rgba(197,152,73,.4);
      color: #C59849;
      font-weight: 600;
    }

    /* ── TABS ────────────────────────────────────────── */
    .tab-nav {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #888;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 14px;
      cursor: pointer;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: #C2C2C2; }
    .tab-btn.active { color: #C59849; border-bottom-color: #C59849; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── COMPACT FRAGRANCE CARDS ─────────────────────── */
    .frag-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    .frag-card-compact {
      background: rgba(0,0,0,.35);
      border: 1px solid #333;
      border-radius: 10px;
      overflow: hidden;
      transition: border-color .25s, transform .2s;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .frag-card-compact:hover { border-color: #C59849; transform: translateY(-3px); }

    .frag-card-thumb {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #1a1a1a;
      display: block;
    }

    .frag-card-thumb-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #333;
    }

    .frag-card-body { padding: 8px 10px; }

    .frag-card-brand { font-size: 0.7rem; color: #888; margin-bottom: 2px; }
    .frag-card-name { font-size: 0.8rem; color: #e0e0e0; font-weight: 600; line-height: 1.3; }

    /* Signature card variant */
    .sig-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px;
      background: rgba(44,19,11,.3);
      border: 1px solid #3a2a1a;
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      transition: border-color .25s;
    }

    .sig-card:hover { border-color: #C59849; }

    .sig-card-img {
      width: 70px;
      height: 70px;
      object-fit: cover;
      border-radius: 8px;
      background: #1a1a1a;
      flex-shrink: 0;
    }

    .sig-card-placeholder {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: #333;
      flex-shrink: 0;
    }

    .sig-card-brand { font-size: 0.8rem; color: #888; margin-bottom: 4px; }
    .sig-card-name { font-size: 1rem; color: #fff; font-weight: 600; }

    /* Numbered list variant */
    .frag-list-numbered { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    .frag-list-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .frag-num {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #444;
      min-width: 30px;
      text-align: right;
      flex-shrink: 0;
    }

    .frag-item-card {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      padding: 10px 14px;
      background: rgba(0,0,0,.3);
      border: 1px solid #333;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color .25s, background .25s;
    }

    .frag-item-card:hover { border-color: #C59849; background: rgba(44,19,11,.25); }

    .frag-item-img {
      width: 44px;
      height: 44px;
      object-fit: cover;
      border-radius: 6px;
      background: #1a1a1a;
      flex-shrink: 0;
    }

    .frag-item-text { flex: 1; min-width: 0; }
    .frag-item-brand { font-size: 0.72rem; color: #888; }
    .frag-item-name { font-size: 0.88rem; color: #e0e0e0; font-weight: 600; line-height: 1.3; }

    /* ── COLLECTIONS ─────────────────────────────────── */
    .collections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .collection-card {
      background: rgba(0,0,0,.3);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: border-color .25s, transform .2s;
    }

    .collection-card:hover { border-color: #C59849; transform: translateY(-3px); }

    .collection-card-name {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: #C59849;
      margin-bottom: 5px;
    }

    .collection-card-desc {
      color: #999;
      font-size: 0.82rem;
      margin-bottom: 8px;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .collection-card-meta { display: flex; align-items: center; gap: 8px; }

    .collection-card-count { color: #777; font-size: 0.8rem; }

    .collection-thumb-row { display: flex; gap: 4px; margin-bottom: 8px; }

    .collection-thumb {
      width: 36px;
      height: 36px;
      object-fit: cover;
      border-radius: 5px;
      background: #1a1a1a;
    }

    /* ── STATS GRID ──────────────────────────────────── */
    .stats-compact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
    }

    .stat-box {
      background: rgba(44,19,11,.25);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 14px 12px;
      text-align: center;
    }

    .stat-box-value {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      color: #C59849;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-box-label {
      color: #888;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── ACTIVITY ITEMS ──────────────────────────────── */
    .activity-item {
      padding: 12px 14px;
      background: rgba(44,19,11,.2);
      border-left: 3px solid #2C130B;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .activity-item:last-child { margin-bottom: 0; }

    .activity-item-title {
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 4px;
      text-decoration: none;
      display: block;
      transition: color .2s;
    }

    .activity-item-title:hover { color: #C59849; }

    .activity-item-snippet {
      color: #aaa;
      font-size: 0.82rem;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .activity-item-date { color: #666; font-size: 0.76rem; }

    .view-all-link {
      display: inline-block;
      margin-top: 10px;
      color: #C59849;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: color .2s;
    }

    .view-all-link:hover { color: #fff; }

    /* ── MODALS / OVERLAYS ───────────────────────────── */
    .follow-modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,.85);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .follow-modal-overlay.active { display: flex; }

    .follow-modal {
      background: linear-gradient(135deg, #111, #1e1e1e);
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      max-width: 560px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    .follow-modal-header {
      padding: 18px 22px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .follow-modal-title { font-family: 'Cinzel', serif; font-size: 1.3rem; color: #C59849; }

    .follow-modal-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.8rem;
      cursor: pointer;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: background .2s;
    }

    .follow-modal-close:hover { background: rgba(255,255,255,.1); }

    .follow-modal-content { padding: 18px 22px; overflow-y: auto; flex: 1; }

    .follow-user-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px;
      background: rgba(0,0,0,.3);
      border: 1px solid #333;
      border-radius: 8px;
      margin-bottom: 8px;
      transition: border-color .2s;
    }

    .follow-user-item:hover { border-color: #C59849; }

    .follow-user-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
    .follow-user-info { flex: 1; }

    .follow-user-name {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: #fff;
      text-decoration: none;
      display: block;
    }

    .follow-user-name:hover { color: #C59849; }

    .follow-modal-empty { text-align: center; padding: 32px 20px; color: #666; }

    .follow-modal-load-more {
      font-family: 'Montserrat', sans-serif;
      padding: 10px 20px;
      background: #2C130B;
      border: 1px solid #C59849;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      transition: background .2s;
      width: 100%;
      margin-top: 8px;
    }

    .follow-modal-load-more:hover { background: #4a2619; }
    .follow-modal-load-more:disabled { opacity: .6; cursor: not-allowed; }

    /* ── MISC ────────────────────────────────────────── */
    .back-button {
      display: inline-block;
      color: #ccc;
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 16px;
      transition: color .2s;
    }

    .back-button:hover { color: #fff; }

    .hidden { display: none !important; }

    .loading-state {
      text-align: center;
      padding: 100px 20px;
      font-size: 1.1rem;
      color: #666;
    }

    .error-state {
      text-align: center;
      padding: 60px 20px;
      background: #111;
      border: 1px solid #5a0000;
      border-radius: 14px;
      margin: 40px 0;
    }

    .error-title { font-family: 'Cinzel', serif; font-size: 1.8rem; color: #ff6b6b; margin-bottom: 14px; }
    .error-text { color: #aaa; margin-bottom: 24px; }

    .action-buttons {
      text-align: center;
      margin-top: 24px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-edit {
      background: linear-gradient(135deg, #2C130B, #4a2619);
      color: #fff;
      padding: 12px 36px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      text-decoration: none;
      display: inline-block;
      transition: background .25s, transform .2s;
    }

    .btn-edit:hover { background: linear-gradient(135deg, #4a2619, #6b3829); transform: translateY(-2px); }

    .leaderboard-message {
      font-style: italic;
      color: #C59849;
      padding: 12px 14px;
      background: rgba(44,19,11,.3);
      border-left: 3px solid #C59849;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }

    .social-links { display: flex; gap: 12px; flex-wrap: wrap; }

    .social-links a {
      color: #C59849;
      text-decoration: none;
      font-size: 0.88rem;
      transition: color .2s;
    }

    .social-links a:hover { color: #fff; }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width: 768px) {
      .header-image { height: 160px; }

      .profile-picture {
        width: 90px; height: 90px;
        top: -45px; left: 20px;
      }

      .profile-info-wrapper { padding: 58px 20px 18px; flex-direction: column; }
      .profile-name { font-size: 1.5rem; }
      .profile-header-stats { width: 100%; }

      .frag-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }

      .dna-label { min-width: auto; width: 100%; }

      .stats-compact-grid { grid-template-columns: repeat(2, 1fr); }

      .action-buttons { flex-direction: column; }
      .btn-edit { width: 100%; text-align: center; }
    }
  </style>
  <link rel="stylesheet" href="navbar.css">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="notifications-dropdown hidden" id="notifications-dropdown">
    <div class="notifications-header">Notifications</div>
    <div class="notifications-list" id="notifications-list">Loading...</div>
  </div>

  <div id="loadingState" class="loading-state">Loading profile...</div>

  <div id="errorState" class="error-state hidden">
    <h1 class="error-title">User Not Found</h1>
    <p class="error-text">This user doesn't exist or has been removed.</p>
    <a href="forum.html" class="back-button">← Back to Forum</a>
  </div>

  <div id="profileContainer" class="profile-container hidden">
    <a href="forum.html" class="back-button">← Back to Forum</a>

    <!-- HEADER -->
    <div class="profile-header-section">
      <div class="header-image" id="headerImage"></div>
      <div class="profile-info-wrapper">
        <div class="profile-picture" id="profilePicture"></div>
        <div class="profile-main-info">
          <h1 class="profile-name" id="profileUsername">Loading...</h1>
          <div class="profile-handle" id="profileHandle"></div>
          <div class="profile-meta-line" id="profileMetaLine"></div>
          <div class="profile-sig-line hidden" id="profileSigLine"></div>
          <div class="profile-style-chips hidden" id="profileStyleChips"></div>
          <div class="profile-bio-header hidden" id="profileBioHeader"></div>
        </div>
        <div class="profile-header-stats" id="profileHeaderStats" style="display:none;">
          <button class="header-stat" id="followersBtn" type="button">
            <div class="header-stat-num" id="followersCount">0</div>
            <div class="header-stat-label">Followers</div>
          </button>
          <button class="header-stat" id="followingBtn" type="button">

            <div class="header-stat-label">Following</div>
          </button>
          <div class="header-stat" id="pointsStatBox" style="display:none;">

            <div class="header-stat-label">Points</div>
          </div>
        </div>

      <div id="followButtonWrap"></div>
    </div>

    <!-- SCENT DNA -->
    <div class="profile-section hidden" id="scentDnaSection">

        <h2 class="section-title">Scent DNA</h2>
      </div>
      <div id="scentDnaContent"></div>

    <div class="profile-section hidden" id="fragranceShowcaseSection">

      </div>
      <nav class="tab-nav" id="showcaseTabs" role="tablist"></nav>
      <div id="showcasePanels"></div>

    <!-- COLLECTIONS -->
    <div class="profile-section hidden" id="collectionsSection">

        <h2 class="section-title">Collections</h2>

      <div id="collectionsContainer" class="collections-grid">

    <div class="profile-section hidden" id="statsSection">
      <div class="section-header">
        <h2 class="section-title">Stats</h2>
      </div>
      <div class="stats-compact-grid" id="statsGrid"></div>
      <div id="leaderboardProfileInfo" style="display:none; margin-top:14px;">
        <div class="leaderboard-message hidden" id="publicMessage"></div>
        <div class="social-links" id="socialLinks"></div>
      </div>
    </div>

    <!-- RECENT ACTIVITY -->
    <div class="profile-section hidden" id="activitySection">
      <div class="section-header">
        <h2 class="section-title">Recent Activity</h2>

      <nav class="tab-nav" id="activityTabs" role="tablist"></nav>
      <div id="activityPanels"></div>

    <div class="action-buttons hidden" id="editButtonContainer">
      <a href="profile.html" class="btn-edit">Edit My Profile</a>
